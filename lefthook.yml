pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{js,ts,cjs,mjs,jsx,tsx,astro,json,jsonc,css}"
      run: bunx biome check --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    lint:
      run: npx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    check:
      run: npx biome check .
    check-types:
      run: bun run check
